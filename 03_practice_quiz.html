<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F3 Chemistry — 練習卷</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Grotesk:wght@400;600;700;800&display=swap');

  :root {
    --bg: #f8f7f3;
    --card: #ffffff;
    --ink: #1a1a2e;
    --muted: #64748b;
    --rule: #e5e3db;
    --blue: #2563eb;
    --green: #16a34a;
    --red: #dc2626;
    --amber: #d97706;
    --purple: #7c3aed;
    --correct-bg: #f0fdf4;
    --correct-border: #86efac;
    --wrong-bg: #fef2f2;
    --wrong-border: #fca5a5;
    --selected-bg: #eff6ff;
    --selected-border: #93c5fd;
  }

  * { box-sizing: border-box; margin:0; padding:0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    line-height: 1.7;
  }

  /* ── COVER ── */
  #cover {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--ink);
    color: #fff;
    padding: 40px 24px;
    text-align: center;
  }
  #cover .inner { max-width: 560px; }
  .cover-badge {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: 16px;
  }
  #cover h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 38px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  #cover h1 em { color: #f59e0b; font-style: normal; }
  #cover p { color: #94a3b8; font-size: 14px; margin-bottom: 32px; }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 32px;
    text-align: left;
  }
  .info-item {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .info-item .lbl { font-size: 11px; color: #64748b; margin-bottom: 2px; letter-spacing:.04em; }
  .info-item .val { font-weight: 700; font-size: 18px; }

  .name-input {
    width: 100%;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 8px;
    padding: 12px 16px;
    color: #fff;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 16px;
    margin-bottom: 20px;
    outline: none;
    transition: border-color .2s;
  }
  .name-input:focus { border-color: #f59e0b; }
  .name-input::placeholder { color: #64748b; }

  .btn-start {
    width: 100%;
    padding: 16px;
    background: #f59e0b;
    color: #1a1a2e;
    border: none;
    border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  .btn-start:hover { background: #d97706; }
  .btn-start:active { transform: scale(.98); }

  /* ── QUIZ SCREEN ── */
  #quiz-screen { display: none; }

  .quiz-header {
    background: var(--ink);
    color: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  .quiz-header .left { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 15px; }
  .quiz-header .left span { color: #94a3b8; font-weight: 400; font-size: 13px; }
  .progress-bar { flex: 1; margin: 0 20px; height: 4px; background: rgba(255,255,255,.1); border-radius: 2px; }
  .progress-fill { height: 100%; background: #f59e0b; border-radius: 2px; transition: width .3s; }
  .q-counter { font-family: 'Space Grotesk', sans-serif; font-size: 13px; color: #94a3b8; white-space: nowrap; }

  .quiz-body { max-width: 820px; margin: 0 auto; padding: 32px 20px 80px; }

  /* ── SECTION DIVIDER ── */
  .section-div {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 32px 0 20px;
  }
  .section-div .tag {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .section-div::after { content:''; flex:1; height:1px; background: var(--rule); }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 22px 24px;
    margin-bottom: 16px;
    transition: box-shadow .2s;
  }
  .q-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.06); }

  .q-num {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .q-text {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .q-text sub, .q-text sup { font-size: 11px; }

  /* TABLE IN QUESTION */
  .q-table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
  .q-table th { background: #f1f5f9; padding: 8px 12px; text-align:left; font-weight:600; border: 1px solid var(--rule); }
  .q-table td { padding: 8px 12px; border: 1px solid var(--rule); }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 14px;
    border: 1.5px solid var(--rule);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    font-size: 13px;
    line-height: 1.5;
    user-select: none;
  }
  .option:hover { border-color: #93c5fd; background: #f8faff; }
  .option.selected { border-color: var(--blue); background: var(--selected-bg); }
  .option.correct  { border-color: var(--correct-border); background: var(--correct-bg); }
  .option.wrong    { border-color: var(--wrong-border);   background: var(--wrong-bg); }
  .option.reveal-correct { border-color: var(--correct-border); background: var(--correct-bg); }

  .opt-letter {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 13px;
    min-width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #f1f5f9;
    display: flex; align-items:center; justify-content:center;
    flex-shrink: 0;
    margin-top: 1px;
    transition: background .15s, color .15s;
  }
  .option.selected .opt-letter { background: var(--blue); color: #fff; }
  .option.correct  .opt-letter { background: var(--green); color: #fff; }
  .option.wrong    .opt-letter { background: var(--red);   color: #fff; }
  .option.reveal-correct .opt-letter { background: var(--green); color: #fff; }

  /* EXPLANATION */
  .explanation {
    display: none;
    margin-top: 12px;
    padding: 12px 14px;
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
  }
  .explanation .exp-title { font-weight: 700; color: #92400e; margin-bottom: 4px; }
  .explanation.show { display: block; }

  /* SUBMIT ROW */
  .submit-row {
    display: flex;
    justify-content: center;
    margin-top: 40px;
  }
  .btn-submit {
    padding: 14px 48px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  .btn-submit:hover { background: #2d3748; }
  .btn-submit:active { transform: scale(.98); }
  .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }

  /* ── RESULT SCREEN ── */
  #result-screen { display:none; }

  .result-hero {
    background: var(--ink);
    color: #fff;
    text-align: center;
    padding: 60px 24px 48px;
  }
  .result-hero .grade {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 80px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 8px;
  }
  .result-hero .grade.A { color: #4ade80; }
  .result-hero .grade.B { color: #60a5fa; }
  .result-hero .grade.C { color: #fbbf24; }
  .result-hero .grade.F { color: #f87171; }
  .result-hero .score-txt { font-size: 18px; color: #94a3b8; margin-bottom: 4px; }
  .result-hero .name-txt { font-size: 14px; color: #64748b; }

  .result-body { max-width: 820px; margin: 0 auto; padding: 40px 20px 80px; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px; }
  .stat-box {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
  }
  .stat-box .sv { font-family:'Space Grotesk',sans-serif; font-size:28px; font-weight:800; margin-bottom:4px; }
  .stat-box .sl { font-size:12px; color:var(--muted); }
  .sv.green { color: var(--green); }
  .sv.red   { color: var(--red); }
  .sv.blue  { color: var(--blue); }

  .review-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .review-card {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 12px;
  }
  .review-card .rq { font-weight: 600; margin-bottom: 8px; font-size: 14px; }
  .review-card .ryours { font-size:13px; padding: 6px 10px; border-radius:6px; margin-bottom:6px; }
  .ryours.wrong-ans { background: var(--wrong-bg); color: var(--red); }
  .ryours.right-ans { background: var(--correct-bg); color: var(--green); }
  .review-card .rexp { font-size:13px; color:#475569; margin-top:8px; padding-top:8px; border-top:1px solid var(--rule); }

  .btn-retry {
    display: block;
    width: 100%;
    max-width: 320px;
    margin: 32px auto 0;
    padding: 14px;
    background: #f59e0b;
    color: #1a1a2e;
    border:none;
    border-radius:8px;
    font-family:'Space Grotesk',sans-serif;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    text-align:center;
    transition: background .15s;
  }
  .btn-retry:hover { background: #d97706; }

  /* PRINT */
  @media print {
    #cover, .quiz-header, .btn-submit, .btn-retry { display:none !important; }
  }
</style>
</head>
<body>

<!-- ══════════ COVER ══════════ -->
<div id="cover">
  <div class="inner">
    <div class="cover-badge">F3 Chemistry · Term 2</div>
    <h1>Chemical Bonding<br><em>練習卷</em></h1>
    <p>Ch 5–6 計算 · Ch 7 Ionic · Ch 8 Covalent · Ch 9 Metallic<br>共 20 題 MCQ · 建議時間 25 分鐘</p>

    <div class="info-grid">
      <div class="info-item">
        <div class="lbl">題目數目</div>
        <div class="val">20 題</div>
      </div>
      <div class="info-item">
        <div class="lbl">每題分數</div>
        <div class="val">1 分</div>
      </div>
      <div class="info-item">
        <div class="lbl">建議時間</div>
        <div class="val">25 分鐘</div>
      </div>
      <div class="info-item">
        <div class="lbl">涵蓋章節</div>
        <div class="val">Ch 5–9</div>
      </div>
    </div>

    <input type="text" class="name-input" id="student-name" placeholder="請輸入姓名 Name" />
    <button class="btn-start" onclick="startQuiz()">開始測試 Start →</button>
  </div>
</div>

<!-- ══════════ QUIZ SCREEN ══════════ -->
<div id="quiz-screen">
  <div class="quiz-header">
    <div class="left">F3 Chemistry <span id="hdr-name"></span></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="q-counter" id="q-counter">0 / 20 answered</div>
  </div>
  <div class="quiz-body" id="quiz-body"></div>
  <div class="submit-row">
    <button class="btn-submit" id="btn-submit" onclick="submitQuiz()">交卷 Submit</button>
  </div>
</div>

<!-- ══════════ RESULT SCREEN ══════════ -->
<div id="result-screen">
  <div class="result-hero">
    <div class="grade" id="res-grade">A</div>
    <div class="score-txt" id="res-score">18 / 20</div>
    <div class="name-txt" id="res-name"></div>
  </div>
  <div class="result-body">
    <div class="stats-row">
      <div class="stat-box"><div class="sv green" id="res-correct">0</div><div class="sl">答對 Correct</div></div>
      <div class="stat-box"><div class="sv red"   id="res-wrong">0</div><div class="sl">答錯 Wrong</div></div>
      <div class="stat-box"><div class="sv blue"  id="res-pct">0%</div><div class="sl">正確率 Accuracy</div></div>
    </div>
    <div class="review-title">詳細解析 Answer Review</div>
    <div id="review-list"></div>
    <button class="btn-retry" onclick="retryQuiz()">重新測試 Retry</button>
  </div>
</div>

<script>
// ════════════════════════════════════════
//  QUESTION BANK
// ════════════════════════════════════════
const questions = [
  // ── SECTION: Ch 7 Ionic Bonding ──
  {
    section: "Ch 7 — Ionic Bonding",
    sectionColor: "#2563eb",
    text: "Which of the following best explains why sodium chloride (NaCl) has a high melting point?",
    options: [
      "The covalent bonds in NaCl are very strong.",
      "There are strong electrostatic attractions between oppositely charged ions.",
      "The NaCl molecules are very large.",
      "NaCl has many delocalized electrons."
    ],
    answer: 1,
    explanation: "NaCl 是離子化合物，擁有 giant ionic lattice。熔點高是因為 strong electrostatic attraction between oppositely charged ions（Na⁺ 和 Cl⁻）。唔係 covalent bonds（NaCl 無共價鍵），唔係 molecules（NaCl 無獨立分子），唔係 delocalized electrons（那是金屬的特性）。"
  },
  {
    section: "Ch 7 — Ionic Bonding",
    sectionColor: "#2563eb",
    text: "Calcium oxide (CaO) has a higher melting point than sodium chloride (NaCl). What is the main reason for this?",
    options: [
      "CaO has more atoms than NaCl.",
      "Ca²⁺ and O²⁻ have higher charges than Na⁺ and Cl⁻, leading to stronger electrostatic forces.",
      "CaO is less soluble in water.",
      "CaO has a simpler crystal structure."
    ],
    answer: 1,
    explanation: "CaO 含 Ca²⁺（電荷 +2）和 O²⁻（電荷 −2），而 NaCl 含 Na⁺（+1）和 Cl⁻（−1）。電荷越高，靜電吸引力越強，熔點越高。呢係離子鍵熔點比較的核心概念。"
  },
  {
    section: "Ch 7 — Ionic Bonding",
    sectionColor: "#2563eb",
    text: "Ionic compounds are brittle. When a mechanical force is applied to an ionic crystal, it cracks. What is the best explanation?",
    options: [
      "The ionic bonds are not strong enough to hold the crystal together.",
      "The lattice is held by weak intermolecular forces.",
      "Layers of ions shift so that ions of the same charge align and repel each other.",
      "Delocalized electrons escape, weakening the structure."
    ],
    answer: 2,
    explanation: "當 ionic crystal 受力，layers 移位，導致同電荷離子（如 Na⁺ 對 Na⁺）相鄰，產生排斥力（repulsion），令晶體裂開（crack / shatter）。呢個係 ionic 脆性的正確解釋，與金屬的 malleable（layers 滑動但不排斥）形成對比。"
  },
  {
    section: "Ch 7 — Ionic Bonding",
    sectionColor: "#2563eb",
    text: "Which of the following correctly describes the electrical conductivity of potassium chloride (KCl)?",
    options: [
      "Conducts electricity in solid state only.",
      "Conducts electricity in all states.",
      "Conducts electricity when molten or dissolved in water, but not in solid state.",
      "Does not conduct electricity in any state."
    ],
    answer: 2,
    explanation: "KCl 係離子化合物。固態時 ions 固定，無法移動，不導電。熔融或溶於水時，ions 自由移動（mobile ions），可以導電。選項 A、B、D 均錯誤。"
  },
  {
    section: "Ch 7 — Ionic Bonding",
    sectionColor: "#2563eb",
    text: "When an ionic solid dissolves in water, the cations are attracted to which part of the water molecule?",
    options: [
      "The hydrogen end (partial positive, δ⁺)",
      "The oxygen end (partial negative, δ⁻)",
      "The centre of the water molecule",
      "No attraction occurs"
    ],
    answer: 1,
    explanation: "水分子係極性分子。O 帶部分負電（δ⁻），H 帶部分正電（δ⁺）。Cation（正離子）被帶負電的 oxygen end（δ⁻）吸引；anion（負離子）被帶正電的 hydrogen end（δ⁺）吸引。"
  },

  // ── SECTION: Ch 8 Covalent Bonding ──
  {
    section: "Ch 8 — Covalent Bonding",
    sectionColor: "#16a34a",
    text: "Iodine (I₂) has a low melting point. Which of the following best explains this?",
    options: [
      "The covalent bonds in I₂ molecules are weak.",
      "Iodine atoms are very small.",
      "The intermolecular forces between I₂ molecules are weak.",
      "Iodine does not form a lattice structure."
    ],
    answer: 2,
    explanation: "最常見錯誤！I₂ 低熔點係因為 weak intermolecular forces between molecules，唔係因為 covalent bonds weak（I–I 共價鍵其實幾強）。熔化時打斷的是分子間力，唔係共價鍵。"
  },
  {
    section: "Ch 8 — Covalent Bonding",
    sectionColor: "#16a34a",
    text: "Which of the following statements about iodine (I₂) is INCORRECT?",
    options: [
      "It is a solid at room temperature and pressure.",
      "It is a halogen.",
      "It is soluble in water and organic solvents.",
      "It reacts with sodium to form an ionic compound."
    ],
    answer: 2,
    explanation: "I₂ 不溶於水（non-polar molecule），但溶於有機溶劑（如 hexane）。選項 C「soluble in water AND organic solvents」係錯誤的。A 正確（室溫固態）；B 正確（第 17 族 halogen）；D 正確（2Na + I₂ → 2NaI）。"
  },
  {
    section: "Ch 8 — Covalent Bonding",
    sectionColor: "#16a34a",
    text: "Which of the following has a giant covalent structure?",
    options: [
      "N₂H₄",
      "OF₂",
      "Silicon dioxide (SiO₂)",
      "Carbon dioxide (CO₂)"
    ],
    answer: 2,
    explanation: "SiO₂（石英）係 giant covalent structure，熔點極高，不導電。N₂H₄ 和 OF₂ 都係 simple molecular；CO₂ 都係 simple molecular。注意 OF₂ 唔係 giant covalent（常見陷阱）。"
  },
  {
    section: "Ch 8 — Covalent Bonding",
    sectionColor: "#16a34a",
    text: "Which statement about diamond is INCORRECT?",
    options: [
      "It has a giant covalent structure.",
      "It has a high melting point.",
      "It dissolves in water to give a colourless solution.",
      "It does not dissolve in hexane."
    ],
    answer: 2,
    explanation: "Diamond 不溶於水，亦不溶於有機溶劑如 hexane。選項 C 說「溶於水」是錯誤的。A 正確（giant covalent）；B 正確（熔點約 3550°C）；D 正確（不溶於 hexane）。"
  },
  {
    section: "Ch 8 — Covalent Bonding",
    sectionColor: "#16a34a",
    text: "Graphite can conduct electricity but diamond cannot. What is the reason for graphite's electrical conductivity?",
    options: [
      "Graphite has mobile ions in its structure.",
      "Graphite has delocalized electrons that can move within the layers.",
      "Graphite dissolves in water to release charged particles.",
      "Graphite has a simple molecular structure with free electrons."
    ],
    answer: 1,
    explanation: "Graphite 係 giant covalent 結構，每個 C 與 3 個 C 鍵合，第 4 個電子成為 delocalized electron（離域電子），可在層內自由移動，令 graphite 可以導電。Diamond 每個 C 與 4 個 C 鍵合，無 free electrons，不導電。"
  },
  {
    section: "Ch 8 — Covalent Bonding",
    sectionColor: "#16a34a",
    text: "The table below gives information about four substances. Which substance is most likely a simple molecular compound?\n\nMelting point: W=17°C, X=455°C, Y=1064°C, Z=3550°C",
    options: [
      "W (melting point 17°C, poor conductivity in all states, soluble)",
      "X (melting point 455°C, poor solid but good liquid conductivity, soluble)",
      "Y (melting point 1064°C, good conductivity in all states, insoluble)",
      "Z (melting point 3550°C, poor conductivity in all states, insoluble)"
    ],
    answer: 0,
    explanation: "Simple molecular 特徵：低熔點、不導電（固液均差）、多數可溶。W 熔點只有 17°C，符合 simple molecular 特性。X（熔融導電）→ ionic；Y（固液均導電）→ metallic；Z（極高熔點 + 不導電）→ giant covalent（似 diamond）。"
  },
  {
    section: "Ch 8 — Covalent Bonding",
    sectionColor: "#16a34a",

    answer: 2,

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let studentName = '';
let userAnswers = new Array(questions.length).fill(null);
let submitted = false;

// ════════════════════════════════════════
//  START
// ════════════════════════════════════════
function startQuiz() {
  studentName = document.getElementById('student-name').value.trim() || '學生';
  document.getElementById('cover').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('hdr-name').textContent = '— ' + studentName;
  renderQuiz();
  updateProgress();
}

// ════════════════════════════════════════
//  RENDER QUIZ
// ════════════════════════════════════════
function renderQuiz() {
  const body = document.getElementById('quiz-body');
  body.innerHTML = '';

  let lastSection = null;
  const letters = ['A', 'B', 'C', 'D'];

  questions.forEach((q, qi) => {
    if (q.section !== lastSection) {
      const div = document.createElement('div');
      div.className = 'section-div';
      div.innerHTML = `<span class="tag" style="background:${q.sectionColor}22;color:${q.sectionColor}">${q.section}</span>`;
      body.appendChild(div);
      lastSection = q.section;
    }

    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'qcard-' + qi;

    // Format question text (handle newlines)
    const qTextFormatted = q.text.replace(/\n/g, '<br>');

    card.innerHTML = `
      <div class="q-num">Q${qi + 1}</div>
      <div class="q-text">${qTextFormatted}</div>
      <div class="options" id="opts-${qi}">
        ${q.options.map((opt, oi) => `
          <div class="option" id="opt-${qi}-${oi}" onclick="selectOption(${qi}, ${oi})">
            <div class="opt-letter">${letters[oi]}</div>
            <div>${opt}</div>
          </div>
        `).join('')}
      </div>
      <div class="explanation" id="exp-${qi}">
        <div class="exp-title">💡 解析</div>
        ${q.explanation}
      </div>
    `;
    body.appendChild(card);
  });
}

// ════════════════════════════════════════
//  SELECT OPTION
// ════════════════════════════════════════
function selectOption(qi, oi) {
  if (submitted) return;

  // Clear previous selection in this question
  for (let i = 0; i < questions[qi].options.length; i++) {
    const el = document.getElementById(`opt-${qi}-${i}`);
    el.classList.remove('selected');
  }

  // Set new selection
  document.getElementById(`opt-${qi}-${oi}`).classList.add('selected');
  userAnswers[qi] = oi;
  updateProgress();
}

// ════════════════════════════════════════
//  PROGRESS
// ════════════════════════════════════════
function updateProgress() {
  const answered = userAnswers.filter(a => a !== null).length;
  const pct = (answered / questions.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-counter').textContent = `${answered} / ${questions.length} answered`;
}

// ════════════════════════════════════════
//  SUBMIT
// ════════════════════════════════════════
function submitQuiz() {
  const unanswered = userAnswers.filter(a => a === null).length;
  if (unanswered > 0) {
    const proceed = confirm(`你仲有 ${unanswered} 題未答。確定交卷？\n\nYou have ${unanswered} unanswered questions. Submit anyway?`);
    if (!proceed) return;
  }

  submitted = true;
  document.getElementById('btn-submit').disabled = true;

  const letters = ['A', 'B', 'C', 'D'];

  // Mark answers
  questions.forEach((q, qi) => {
    const userAns = userAnswers[qi];
    const correctAns = q.answer;

    for (let i = 0; i < q.options.length; i++) {
      const el = document.getElementById(`opt-${qi}-${i}`);
      el.onclick = null; // disable clicking
      el.style.cursor = 'default';
    }

    if (userAns !== null) {
      const userEl = document.getElementById(`opt-${qi}-${userAns}`);
      userEl.classList.remove('selected');
      if (userAns === correctAns) {
        userEl.classList.add('correct');
      } else {
        userEl.classList.add('wrong');
        document.getElementById(`opt-${qi}-${correctAns}`).classList.add('reveal-correct');
      }
    } else {
      document.getElementById(`opt-${qi}-${correctAns}`).classList.add('reveal-correct');
    }

    // Show explanation
    document.getElementById(`exp-${qi}`).classList.add('show');
  });

  // Scroll to results after delay
  setTimeout(showResults, 1000);
}

// ════════════════════════════════════════
//  SHOW RESULTS
// ════════════════════════════════════════
function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  window.scrollTo(0, 0);

  let correct = 0;
  const wrongQs = [];

  questions.forEach((q, qi) => {
    if (userAnswers[qi] === q.answer) {
      correct++;
    } else {
      wrongQs.push(qi);
    }
  });

  const wrong = questions.length - correct;
  const pct = Math.round((correct / questions.length) * 100);

  // Grade
  let grade, gradeClass;
  if (pct >= 80) { grade = 'A'; gradeClass = 'A'; }
  else if (pct >= 65) { grade = 'B'; gradeClass = 'B'; }
  else if (pct >= 50) { grade = 'C'; gradeClass = 'C'; }
  else { grade = 'F'; gradeClass = 'F'; }

  document.getElementById('res-grade').textContent = grade;
  document.getElementById('res-grade').className = 'grade ' + gradeClass;
  document.getElementById('res-score').textContent = `${correct} / ${questions.length}`;
  document.getElementById('res-name').textContent = studentName + ' · ' + new Date().toLocaleDateString('zh-TW');
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent = wrong;
  document.getElementById('res-pct').textContent = pct + '%';

  // Review list
  const reviewList = document.getElementById('review-list');
  reviewList.innerHTML = '';
  const letters = ['A','B','C','D'];

  if (wrongQs.length === 0) {
    reviewList.innerHTML = '<div style="text-align:center;padding:32px;color:#16a34a;font-weight:700;font-size:16px;">🎉 全部正確！Perfect Score!</div>';
  } else {
    wrongQs.forEach(qi => {
      const q = questions[qi];
      const ua = userAnswers[qi];
      const card = document.createElement('div');
      card.className = 'review-card';
      card.innerHTML = `
        <div class="rq">Q${qi + 1}. ${q.text.replace(/\n/g, ' ')}</div>
        ${ua !== null
          ? `<div class="ryours wrong-ans">❌ 你的答案 Your answer: ${letters[ua]}. ${q.options[ua]}</div>`
          : `<div class="ryours wrong-ans">❌ 未有作答 Not answered</div>`
        }
        <div class="ryours right-ans">✅ 正確答案 Correct answer: ${letters[q.answer]}. ${q.options[q.answer]}</div>
        <div class="rexp">💡 ${q.explanation}</div>
      `;
      reviewList.appendChild(card);
    });
  }
}

// ════════════════════════════════════════
//  RETRY
// ════════════════════════════════════════
function retryQuiz() {
  submitted = false;
  userAnswers = new Array(questions.length).fill(null);
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('btn-submit').disabled = false;
  document.getElementById('quiz-screen').style.display = 'block';
  renderQuiz();
  updateProgress();
  window.scrollTo(0, 0);
}
</script>
